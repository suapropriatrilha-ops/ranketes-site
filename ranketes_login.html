<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0e14"/>
<title>Ranketes — Login</title>
<link rel="icon" href="logo.PNG" type="image/png"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#070a10;
  --bg2:#0a0e14;
  --surf:rgba(20,24,36,.55);
  --surf-solid:#141826;
  --surf2:#1a2030;
  --border:rgba(139,92,246,.12);
  --border2:rgba(255,255,255,.08);
  --border3:rgba(255,255,255,.04);
  --text:#f0f4ff;
  --muted:#7e8aa1;
  --dim:#5a6478;
  --purple:#8b5cf6;
  --purple-l:#a78bfa;
  --purple-d:#7c3aed;
  --amber:#f59e0b;
  --amber-l:#fbbf24;
  --blue:#3b82f6;
  --blue-l:#60a5fa;
  --green:#22c55e;
  --green-l:#4ade80;
  --danger:#dc2626;
  --danger-l:#f87171;
  --f-display:'Bebas Neue',sans-serif;
  --f-body:'Inter',sans-serif;
  --r:22px;
  --rs:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--f-body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.25rem;line-height:1.5;overflow-x:hidden;position:relative}
body::before{
  content:'';position:fixed;inset:-100px;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%,rgba(139,92,246,.18),transparent 60%),
    radial-gradient(ellipse 50% 50% at 0% 100%,rgba(124,58,237,.10),transparent 60%),
    radial-gradient(ellipse 50% 50% at 100% 100%,rgba(59,130,246,.06),transparent 60%);
  pointer-events:none;z-index:-1;
}

.wrap{max-width:480px;width:100%;display:flex;flex-direction:column;gap:1rem}

/* Card principal com glass */
.card{
  background:var(--surf);
  border:1px solid var(--border2);
  border-radius:var(--r);
  padding:1.6rem 1.4rem 1.8rem;
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  box-shadow:0 20px 60px -20px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
}

/* ====== TABS DE TIPO ====== */
.tabs{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:.5rem;
  margin-bottom:1.4rem;
}
.tab{
  position:relative;
  padding:1rem .4rem .85rem;
  border-radius:16px;
  cursor:pointer;
  background:rgba(255,255,255,.02);
  border:1.5px solid var(--border3);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.55rem;
  font-family:var(--f-body);
  transition:.2s ease;
  color:var(--muted);
}
.tab:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1)}
.tab .ico{font-size:2rem;line-height:1;filter:drop-shadow(0 4px 8px rgba(0,0,0,.3))}
.tab .lbl{font-size:.88rem;font-weight:600;letter-spacing:.2px}

.tab.active{
  background:rgba(255,255,255,.04);
}
.tab.active.atleta{
  border-color:var(--purple);
  box-shadow:0 0 0 3px rgba(139,92,246,.12),0 8px 24px -8px rgba(139,92,246,.4);
  color:var(--purple-l);
}
.tab.active.professor{
  border-color:var(--amber);
  box-shadow:0 0 0 3px rgba(245,158,11,.12),0 8px 24px -8px rgba(245,158,11,.4);
  color:var(--amber-l);
}
.tab.active.arena{
  border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(59,130,246,.12),0 8px 24px -8px rgba(59,130,246,.4);
  color:var(--blue-l);
}

/* ====== TÍTULO DA ÁREA ====== */
.title-row{margin:1.6rem 0 1.4rem;text-align:center}
.title-tipo{
  font-family:var(--f-display);
  font-size:2rem;
  letter-spacing:2.5px;
  line-height:1;
  text-shadow:0 0 30px currentColor;
}
.title-tipo.atleta{color:var(--purple-l)}
.title-tipo.professor{color:var(--amber-l)}
.title-tipo.arena{color:var(--blue-l)}
.title-sub{font-size:.92rem;color:var(--muted);margin-top:.55rem;font-weight:400}

/* ====== TOGGLE ENTRAR/CADASTRAR ====== */
.toggle-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.4rem}
.toggle-btn{
  padding:1rem;
  border-radius:14px;
  font-weight:600;
  font-size:.95rem;
  cursor:pointer;
  background:rgba(255,255,255,.02);
  border:1.5px solid var(--border3);
  color:var(--muted);
  font-family:var(--f-body);
  transition:.2s ease;
}
.toggle-btn:hover{background:rgba(255,255,255,.04);color:var(--text)}
.toggle-btn.active{color:var(--text);background:rgba(255,255,255,.04)}
.toggle-btn.active.atleta{border-color:var(--purple);box-shadow:0 0 0 2px rgba(139,92,246,.12)}
.toggle-btn.active.professor{border-color:var(--amber);box-shadow:0 0 0 2px rgba(245,158,11,.12)}
.toggle-btn.active.arena{border-color:var(--blue);box-shadow:0 0 0 2px rgba(59,130,246,.12)}

/* ====== FORM ====== */
.fg{margin-bottom:1rem}
.fl{display:block;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;margin-bottom:.5rem}

.fi-wrap{position:relative;display:flex;align-items:center}
.fi-icon{
  position:absolute;left:1rem;display:flex;align-items:center;justify-content:center;
  width:22px;height:22px;color:var(--purple-l);pointer-events:none;
}
.fi-icon svg{width:100%;height:100%}
.fi{
  width:100%;
  padding:1rem 1rem 1rem 3rem;
  background:rgba(255,255,255,.02);
  border:1.5px solid var(--border3);
  border-radius:14px;
  color:var(--text);
  font-size:.98rem;
  font-family:var(--f-body);
  transition:.15s;
}
.fi.no-icon{padding-left:1rem}
.fi:focus{outline:none;border-color:rgba(139,92,246,.4);background:rgba(139,92,246,.04)}
.fi::placeholder{color:var(--dim)}

.fi-toggle{
  position:absolute;right:.85rem;display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;background:transparent;border:none;cursor:pointer;color:var(--muted);
  border-radius:8px;transition:.15s;
}
.fi-toggle:hover{color:var(--text);background:rgba(255,255,255,.05)}
.fi-toggle svg{width:20px;height:20px}

/* ====== BOTÃO SUBMIT ====== */
.btn-submit{
  width:100%;
  padding:1.1rem;
  border-radius:14px;
  font-weight:700;
  font-size:1rem;
  letter-spacing:.3px;
  cursor:pointer;
  border:none;
  color:#fff;
  font-family:var(--f-body);
  transition:.2s ease;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  margin-top:.4rem;
}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
.btn-submit.atleta{
  background:linear-gradient(135deg,var(--purple-d),var(--purple));
  box-shadow:0 8px 24px -6px rgba(139,92,246,.5),inset 0 1px 0 rgba(255,255,255,.18);
}
.btn-submit.professor{
  background:linear-gradient(135deg,#d97706,var(--amber-l));
  color:#1a0f00;
  box-shadow:0 8px 24px -6px rgba(245,158,11,.5),inset 0 1px 0 rgba(255,255,255,.25);
}
.btn-submit.arena{
  background:linear-gradient(135deg,#2563eb,var(--blue-l));
  box-shadow:0 8px 24px -6px rgba(59,130,246,.5),inset 0 1px 0 rgba(255,255,255,.18);
}
.btn-submit:hover:not(:disabled){transform:translateY(-2px);filter:brightness(1.08)}
.btn-submit:active:not(:disabled){transform:translateY(0)}

/* ====== LINK ESQUECI ====== */
.link-secundario{
  display:block;text-align:center;font-size:.9rem;cursor:pointer;
  padding:.85rem;text-decoration:none;font-weight:600;margin-top:.4rem;
}
.link-secundario.atleta{color:var(--purple-l)}
.link-secundario.professor{color:var(--amber-l)}
.link-secundario.arena{color:var(--blue-l)}
.link-secundario:hover{filter:brightness(1.15)}

/* ====== ALERT ====== */
.alert{padding:.9rem 1rem;border-radius:12px;font-size:.88rem;margin-bottom:1rem;line-height:1.45;display:none}
.alert.show{display:block}
.alert.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:var(--danger-l)}
.alert.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--amber-l)}
.alert.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green-l)}

/* ====== SPINNER ====== */
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.btn-submit.professor .spinner{border-color:rgba(0,0,0,.3);border-top-color:#000}
@keyframes spin{to{transform:rotate(360deg)}}

/* ====== ADMIN LINK ====== */
.admin-link{position:fixed;bottom:1rem;right:1rem;font-size:.7rem;color:var(--dim);text-decoration:none;opacity:.4;transition:.2s;z-index:10}
.admin-link:hover{opacity:1;color:var(--muted)}

/* ====== FOOTER ====== */
.footer{text-align:center;font-size:.9rem;color:var(--muted);padding:.4rem}
.footer a{color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:.45rem;transition:.15s}
.footer a:hover{color:var(--text)}

/* ====== RESPONSIVO ====== */
@media (max-width:420px){
  .card{padding:1.3rem 1.1rem 1.5rem}
  .tab{padding:.85rem .3rem .7rem}
  .tab .ico{font-size:1.7rem}
  .tab .lbl{font-size:.82rem}
  .title-tipo{font-size:1.7rem}
  .title-sub{font-size:.85rem}
  .toggle-btn{padding:.85rem;font-size:.9rem}
  .fi{padding:.9rem 1rem .9rem 2.85rem;font-size:.94rem}
  .btn-submit{padding:1rem;font-size:.95rem}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <!-- Abas de tipo -->
    <div class="tabs">
      <button class="tab active atleta" data-tipo="atleta" onclick="trocarTipo('atleta')">
        <span class="ico">🎾</span>
        <span class="lbl">Atleta</span>
      </button>
      <button class="tab" data-tipo="professor" onclick="trocarTipo('professor')">
        <span class="ico">🎓</span>
        <span class="lbl">Professor</span>
      </button>
      <button class="tab" data-tipo="arena" onclick="trocarTipo('arena')">
        <span class="ico">🏟️</span>
        <span class="lbl">Arena</span>
      </button>
    </div>
    
    <div class="title-row">
      <div class="title-tipo atleta" id="tituloTipo">ÁREA DO ATLETA</div>
      <div class="title-sub" id="tituloSub">Acompanhe seus jogos e ranking</div>
    </div>

    <!-- Login / Cadastro -->
    <div class="toggle-row">
      <button class="toggle-btn active atleta" id="btnEntrar" onclick="trocarModo('entrar')">Entrar</button>
      <button class="toggle-btn" id="btnCadastrar" onclick="trocarModo('cadastrar')">Cadastrar</button>
    </div>

    <div class="alert" id="alertBox"></div>

    <!-- Form -->
    <form id="formAuth" onsubmit="enviarForm(event)">
      <div class="fg" id="fgNome" style="display:none">
        <label class="fl">Nome completo</label>
        <div class="fi-wrap">
          <span class="fi-icon" id="iconNome">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </span>
          <input type="text" class="fi" id="inpNome" autocomplete="name" placeholder="Seu nome"/>
        </div>
      </div>
      
      <div class="fg">
        <label class="fl">Email</label>
        <div class="fi-wrap">
          <span class="fi-icon" id="iconEmail">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input type="email" class="fi" id="inpEmail" autocomplete="email" placeholder="seu@email.com" required/>
        </div>
      </div>
      
      <div class="fg">
        <label class="fl">Senha</label>
        <div class="fi-wrap">
          <span class="fi-icon" id="iconSenha">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" class="fi" id="inpSenha" autocomplete="current-password" placeholder="••••••••" required/>
          <button type="button" class="fi-toggle" id="btnTogglePwd" onclick="toggleSenha()" aria-label="Mostrar senha">
            <svg id="iconEye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit atleta" id="btnSubmit">
        <span id="btnTexto">Entrar</span>
      </button>
    </form>

    <a class="link-secundario atleta" id="linkEsqueci" onclick="esqueciSenha()">Esqueci minha senha</a>
  </div>

  <div class="footer">
    <a href="index.html">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
      Voltar para o site
    </a>
  </div>
</div>

<a class="admin-link" href="ranketes_admin.html">admin</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
let _tipoSelecionado = 'atleta'
let _modo = 'entrar' // 'entrar' ou 'cadastrar'
let _processando = false

const URLS = {
  atleta: 'ranketes_atleta_v1.html',
  professor: 'ranketes_professor_v2.html',
  arena: 'ranketes_arena_v2.html'
}

const TITULOS = {
  atleta: { titulo: 'ÁREA DO ATLETA', sub: 'Acompanhe seus jogos e ranking' },
  professor: { titulo: 'ÁREA DO PROFESSOR', sub: 'Gerencie alunos, aulas e cobranças' },
  arena: { titulo: 'ÁREA DA ARENA / CLUBE', sub: 'Administre quadras, atletas e torneios' }
}

const ICON_COLOR = {
  atleta: 'var(--purple-l)',
  professor: 'var(--amber-l)',
  arena: 'var(--blue-l)'
}

function trocarTipo(tipo) {
  _tipoSelecionado = tipo
  
  // Atualiza visuais das abas
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.remove('active', 'atleta', 'professor', 'arena')
    if (t.dataset.tipo === tipo) {
      t.classList.add('active', tipo)
    }
  })
  
  // Atualiza título
  const t = TITULOS[tipo]
  const titEl = document.getElementById('tituloTipo')
  titEl.textContent = t.titulo
  titEl.classList.remove('atleta', 'professor', 'arena')
  titEl.classList.add(tipo)
  document.getElementById('tituloSub').textContent = t.sub
  
  // Atualiza cor do botão submit
  const btn = document.getElementById('btnSubmit')
  btn.classList.remove('atleta', 'professor', 'arena')
  btn.classList.add(tipo)

  // Atualiza cor dos toggles entrar/cadastrar
  ['btnEntrar','btnCadastrar'].forEach(id => {
    const el = document.getElementById(id)
    el.classList.remove('atleta','professor','arena')
    if (el.classList.contains('active')) el.classList.add(tipo)
  })

  // Atualiza cor do link "esqueci senha"
  const link = document.getElementById('linkEsqueci')
  link.classList.remove('atleta','professor','arena')
  link.classList.add(tipo)

  // Atualiza cor dos ícones dos inputs
  document.querySelectorAll('.fi-icon').forEach(i => {
    i.style.color = ICON_COLOR[tipo]
  })
  
  esconderAlerta()
}

function trocarModo(modo) {
  _modo = modo
  const btnE = document.getElementById('btnEntrar')
  const btnC = document.getElementById('btnCadastrar')
  
  btnE.classList.toggle('active', modo === 'entrar')
  btnC.classList.toggle('active', modo === 'cadastrar')

  // Aplica a cor do tipo no botão ativo
  ;[btnE, btnC].forEach(b => {
    b.classList.remove('atleta','professor','arena')
    if (b.classList.contains('active')) b.classList.add(_tipoSelecionado)
  })
  
  document.getElementById('fgNome').style.display = modo === 'cadastrar' ? 'block' : 'none'
  document.getElementById('btnTexto').textContent = modo === 'entrar' ? 'Entrar' : 'Criar conta'
  document.getElementById('linkEsqueci').style.display = modo === 'entrar' ? 'block' : 'none'
  
  // ajusta autocomplete
  document.getElementById('inpSenha').setAttribute('autocomplete', modo === 'entrar' ? 'current-password' : 'new-password')
  
  esconderAlerta()
}

function toggleSenha() {
  const input = document.getElementById('inpSenha')
  const icon = document.getElementById('iconEye')
  const isPwd = input.type === 'password'
  input.type = isPwd ? 'text' : 'password'
  if (isPwd) {
    // mostrando senha — ícone de olho cortado
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
  } else {
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
  }
}

function mostrarAlerta(tipo, msg) {
  const el = document.getElementById('alertBox')
  el.className = 'alert show ' + tipo
  el.innerHTML = msg
}

function esconderAlerta() {
  document.getElementById('alertBox').classList.remove('show')
}

function setLoading(loading) {
  _processando = loading
  const btn = document.getElementById('btnSubmit')
  const txt = document.getElementById('btnTexto')
  btn.disabled = loading
  if (loading) {
    txt.innerHTML = '<span class="spinner"></span> Aguarde...'
  } else {
    txt.textContent = _modo === 'entrar' ? 'Entrar' : 'Criar conta'
  }
}

async function enviarForm(e) {
  e.preventDefault()
  if (_processando) return
  
  const email = document.getElementById('inpEmail').value.trim().toLowerCase()
  const senha = document.getElementById('inpSenha').value
  const nome = document.getElementById('inpNome').value.trim()
  
  if (!email || !senha) {
    mostrarAlerta('error', 'Preencha email e senha')
    return
  }
  
  if (_modo === 'cadastrar' && !nome) {
    mostrarAlerta('error', 'Preencha seu nome')
    return
  }
  
  if (senha.length < 6) {
    mostrarAlerta('error', 'Senha precisa ter pelo menos 6 caracteres')
    return
  }
  
  setLoading(true)
  esconderAlerta()
  
  try {
    if (_modo === 'entrar') {
      await fazerLogin(email, senha)
    } else {
      await fazerCadastro(email, senha, nome)
    }
  } catch (err) {
    console.error(err)
    mostrarAlerta('error', 'Erro inesperado: ' + err.message)
    setLoading(false)
  }
}

async function fazerLogin(email, senha) {
  // 1. Login no Supabase
  const { data, error } = await window._sb.auth.signInWithPassword({ email, password: senha })
  
  if (error) {
    setLoading(false)
    if (error.message.includes('Invalid login credentials')) {
      mostrarAlerta('error', '❌ Email ou senha incorretos')
    } else if (error.message.includes('Email not confirmed')) {
      mostrarAlerta('warn', '📧 Confirme seu email antes de entrar.<br>Verifique sua caixa de entrada (e spam).')
    } else {
      mostrarAlerta('error', 'Erro: ' + error.message)
    }
    return
  }
  
  // 2. Verificar tipo de perfil
  const userId = data.user.id
  const userEmail = data.user.email
  
  const tipos = await detectarTiposPerfil(userId, userEmail)
  console.log('[login] tipos detectados:', tipos)
  
  // Verifica se tem o perfil escolhido
  const temPerfil = {
    atleta: tipos.tem_atleta,
    professor: tipos.tem_professor,
    arena: tipos.tem_arena
  }[_tipoSelecionado]
  
  if (temPerfil) {
    // ✓ Tem o perfil certo, redireciona pra o app
    window.location.href = URLS[_tipoSelecionado]
    return
  }
  
  // 3. Não tem o perfil escolhido — verifica se é admin
  if (tipos.eh_admin && _tipoSelecionado !== 'atleta') {
    setLoading(false)
    mostrarAlerta('warn', 
      `⚠️ Esse email é uma conta de <b>ADMIN</b>.<br>` +
      `Use <a href="ranketes_admin.html" style="color:var(--amber-l);text-decoration:underline">a área administrativa</a>.`
    )
    return
  }
  
  // 4. Tem perfil de OUTRO tipo — bloqueia
  let outroTipo = null
  if (tipos.tem_atleta && _tipoSelecionado !== 'atleta') outroTipo = 'atleta'
  else if (tipos.tem_professor && _tipoSelecionado !== 'professor') outroTipo = 'professor'
  else if (tipos.tem_arena && _tipoSelecionado !== 'arena') outroTipo = 'arena'
  
  if (outroTipo) {
    setLoading(false)
    const tipoLabels = { atleta: 'ATLETA', professor: 'PROFESSOR', arena: 'ARENA / CLUBE' }
    const tipoSelLabel = tipoLabels[_tipoSelecionado]
    const outroLabel = tipoLabels[outroTipo]
    
    mostrarAlerta('warn',
      `⚠️ <b>Esse email já está cadastrado como ${outroLabel}</b>.<br><br>` +
      `Cada email só pode ter um tipo de perfil. Pra usar como ${tipoSelLabel}, use outro email.<br><br>` +
      `<a onclick="trocarTipo('${outroTipo}');document.getElementById('btnSubmit').click()" style="color:var(--text);text-decoration:underline;cursor:pointer">→ Entrar como ${outroLabel}</a>`
    )
    // Faz signout pra não deixar autenticado de qualquer jeito
    await window._sb.auth.signOut()
    return
  }
  
  // 5. Login OK mas não tem nenhum perfil — sugere cadastrar
  setLoading(false)
  mostrarAlerta('warn',
    `🤔 Esse email não tem cadastro como <b>${TITULOS[_tipoSelecionado].titulo.replace('ÁREA D','').replace('A ', '').replace('O ', '').replace('E ARENA / CLUBE', 'ARENA')}</b>.<br><br>` +
    `<a onclick="trocarModo('cadastrar')" style="color:var(--amber-l);text-decoration:underline;cursor:pointer">→ Quer criar uma conta agora?</a>`
  )
  await window._sb.auth.signOut()
}

async function fazerCadastro(email, senha, nome) {
  const { data, error } = await window._sb.auth.signUp({
    email,
    password: senha,
    options: {
      data: { nome, tipo: _tipoSelecionado }
    }
  })
  
  if (error) {
    setLoading(false)
    if (error.message.toLowerCase().includes('already registered') || 
        error.message.toLowerCase().includes('already exists') ||
        error.message.toLowerCase().includes('user already')) {
      mostrarAlerta('warn', 
        `⚠️ Esse email já está cadastrado.<br><br>` +
        `<a onclick="trocarModo('entrar')" style="color:var(--amber-l);text-decoration:underline;cursor:pointer">→ Entrar com essa conta</a>`
      )
    } else {
      mostrarAlerta('error', 'Erro ao cadastrar: ' + error.message)
    }
    return
  }
  
  // Cadastro funcionou
  if (data.user && !data.session) {
    // Sem session = precisa confirmar email
    setLoading(false)
    mostrarAlerta('success',
      `✓ Conta criada! Verifique seu email <b>${email}</b> pra confirmar.<br><br>` +
      `Depois disso, volta aqui e faz login.`
    )
    return
  }
  
  // Tem session = login automático após cadastro
  if (data.session) {
    await criarPerfilTipo(data.user.id, _tipoSelecionado, nome)
    window.location.href = URLS[_tipoSelecionado]
  }
}

async function criarPerfilTipo(userId, tipo, nome) {
  try {
    if (tipo === 'atleta') {
      await window._sb.from('atletas').insert([{ usuario_id: userId, ativo: true }])
    } else if (tipo === 'professor') {
      await window._sb.from('professores').insert([{ usuario_id: userId, ativo: true }])
    } else if (tipo === 'arena') {
      await window._sb.from('arenas').insert([{ 
        responsavel_id: userId, 
        nome: nome || 'Arena',
        tipo: 'arena',
        ativo: true 
      }])
    }
  } catch (e) {
    console.warn('Erro criando perfil:', e)
  }
}

async function detectarTiposPerfil(userId, userEmail) {
  const result = {
    tem_atleta: false,
    tem_professor: false,
    tem_arena: false,
    eh_admin: userEmail === 'wexleyrs@gmail.com'
  }
  
  // Tenta a RPC primeiro
  try {
    const { data, error } = await window._sb.rpc('meu_tipo_perfil')
    if (!error && data) {
      return {
        tem_atleta: !!data.tem_atleta,
        tem_professor: !!data.tem_professor,
        tem_arena: !!data.tem_arena,
        eh_admin: !!data.eh_admin
      }
    }
  } catch (e) { console.warn('RPC meu_tipo_perfil falhou:', e) }
  
  // Fallback: queries diretas
  try {
    const { data } = await window._sb.from('atletas')
      .select('id').eq('usuario_id', userId).is('excluido_em', null).maybeSingle()
    if (data) result.tem_atleta = true
  } catch (e) {}
  
  try {
    const { data } = await window._sb.from('professores')
      .select('id').eq('usuario_id', userId).is('excluido_em', null).maybeSingle()
    if (data) result.tem_professor = true
  } catch (e) {}
  
  try {
    const { data } = await window._sb.from('arenas')
      .select('id').eq('responsavel_id', userId).is('excluido_em', null).maybeSingle()
    if (data) result.tem_arena = true
  } catch (e) {}
  
  return result
}

async function esqueciSenha() {
  const email = document.getElementById('inpEmail').value.trim().toLowerCase()
  if (!email) {
    mostrarAlerta('warn', 'Digite seu email primeiro')
    document.getElementById('inpEmail').focus()
    return
  }
  
  if (!confirm(`Enviar link de redefinição de senha para ${email}?`)) return
  
  try {
    const { error } = await window._sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/ranketes_login.html'
    })
    if (error) {
      mostrarAlerta('error', 'Erro: ' + error.message)
      return
    }
    mostrarAlerta('success', `✓ Link enviado para ${email}.<br>Verifique sua caixa de entrada (e spam).`)
  } catch (e) {
    mostrarAlerta('error', 'Erro: ' + e.message)
  }
}

// Se já estiver logado, redireciona pro app correto
document.addEventListener('supabase:ready', async () => {
  try {
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return
    
    const tipos = await detectarTiposPerfil(user.id, user.email)
    
    if (tipos.tem_atleta) {
      window.location.href = URLS.atleta
    } else if (tipos.tem_professor) {
      window.location.href = URLS.professor
    } else if (tipos.tem_arena) {
      window.location.href = URLS.arena
    } else if (tipos.eh_admin) {
      // não redireciona admin auto
    }
  } catch (e) {
    console.warn('check sessão:', e)
  }
})
</script>
