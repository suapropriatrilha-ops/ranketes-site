<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0a1428"/>
<title>Ranketes — Login</title>
<link rel="icon" href="logo.PNG" type="image/png"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050a18;
  --bg2:#0a1428;
  --bg3:#0d1830;
  --surf:rgba(13,24,48,.6);
  --surf2:rgba(20,32,60,.5);
  --border:rgba(59,130,246,.18);
  --border2:rgba(59,130,246,.28);
  --border3:rgba(255,255,255,.06);
  --text:#f0f6ff;
  --muted:#8a9bb8;
  --dim:#5a6a8a;
  --blue:#2563eb;
  --blue-l:#3b82f6;
  --blue-ll:#60a5fa;
  --blue-bright:#4d94ff;
  --green:#22c55e;
  --green-l:#4ade80;
  --amber:#f59e0b;
  --amber-l:#fbbf24;
  --danger:#dc2626;
  --danger-l:#f87171;
  --f-body:'Inter',sans-serif;
  --r:24px;
  --rs:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:var(--f-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1.25rem;
  line-height:1.5;
  overflow-x:hidden;
  position:relative;
}

/* Background com elementos decorativos das cores das raquetes */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(59,130,246,.15), transparent 60%),
    radial-gradient(ellipse 40% 40% at 0% 30%, rgba(34,197,94,.06), transparent 60%),
    radial-gradient(ellipse 40% 40% at 100% 30%, rgba(245,158,11,.06), transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 100%, rgba(59,130,246,.08), transparent 60%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
  pointer-events:none;
  z-index:-2;
}

/* Padrão de pontos decorativo */
body::after{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(circle at 8% 20%, rgba(59,130,246,.08) 1px, transparent 1px),
    radial-gradient(circle at 92% 80%, rgba(59,130,246,.08) 1px, transparent 1px);
  background-size: 24px 24px, 24px 24px;
  pointer-events:none;
  z-index:-1;
  opacity:.5;
}

.wrap{max-width:480px;width:100%;display:flex;flex-direction:column;gap:1rem}

/* Card principal com glass + borda gradiente sutil */
.card{
  position:relative;
  background:linear-gradient(180deg, rgba(13,24,48,.7), rgba(10,20,40,.5));
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:2rem 1.6rem 1.6rem;
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  box-shadow:
    0 20px 60px -20px rgba(0,0,0,.6),
    inset 0 1px 0 rgba(255,255,255,.04),
    0 0 80px -30px rgba(59,130,246,.15);
}

/* Linhas decorativas nas laterais (verde e laranja como na imagem) */
.card::before{
  content:'';
  position:absolute;
  top:8%;
  left:-2px;
  width:60px;
  height:140px;
  background:
    linear-gradient(135deg, transparent 40%, rgba(34,197,94,.4) 50%, transparent 60%),
    linear-gradient(135deg, transparent 45%, rgba(34,197,94,.25) 55%, transparent 65%);
  pointer-events:none;
  border-radius:var(--r) 0 0 0;
  filter:blur(.5px);
  opacity:.6;
}
.card::after{
  content:'';
  position:absolute;
  top:8%;
  right:-2px;
  width:60px;
  height:140px;
  background:
    linear-gradient(225deg, transparent 40%, rgba(245,158,11,.4) 50%, transparent 60%),
    linear-gradient(225deg, transparent 45%, rgba(245,158,11,.25) 55%, transparent 65%);
  pointer-events:none;
  border-radius:0 var(--r) 0 0;
  filter:blur(.5px);
  opacity:.6;
}

/* ====== LOGO ====== */
.logo-row{
  display:flex;
  justify-content:center;
  margin-bottom:1.2rem;
  position:relative;
  z-index:1;
}
.logo-row img{
  width:75%;
  max-width:340px;
  height:auto;
  filter:drop-shadow(0 8px 24px rgba(59,130,246,.35));
}

/* ====== TÍTULO ====== */
.title-row{
  text-align:center;
  margin-bottom:1.6rem;
  position:relative;
  z-index:1;
}
.title-main{
  font-size:1.55rem;
  font-weight:800;
  letter-spacing:-.5px;
  line-height:1.15;
  margin-bottom:.5rem;
}
.title-main .w1{color:#ffffff}
.title-main .w2{color:#22c55e}
.title-main .w3{color:#fbbf24}
.title-sub{
  font-size:.95rem;
  color:#b8c5dc;
  font-weight:400;
}

/* ====== FORM ====== */
.fg{margin-bottom:1.1rem}
.fl{
  display:block;
  font-size:.78rem;
  color:var(--blue-bright);
  text-transform:uppercase;
  letter-spacing:1.5px;
  font-weight:700;
  margin-bottom:.55rem;
}

.fi-wrap{position:relative;display:flex;align-items:center}
.fi-icon{
  position:absolute;
  left:1.1rem;
  display:flex;
  align-items:center;
  justify-content:center;
  width:22px;
  height:22px;
  color:var(--blue-bright);
  pointer-events:none;
}
.fi-icon svg{width:100%;height:100%}
.fi{
  width:100%;
  padding:1.05rem 1rem 1.05rem 3rem;
  background:rgba(10,20,40,.5);
  border:1.5px solid rgba(59,130,246,.25);
  border-radius:14px;
  color:var(--text);
  font-size:1rem;
  font-family:var(--f-body);
  transition:.18s;
}
.fi:focus{
  outline:none;
  border-color:var(--blue-l);
  background:rgba(20,40,80,.5);
  box-shadow:0 0 0 3px rgba(59,130,246,.12);
}
.fi::placeholder{color:#5a6a8a}

.fi-toggle{
  position:absolute;
  right:.85rem;
  display:flex;
  align-items:center;
  justify-content:center;
  width:34px;
  height:34px;
  background:transparent;
  border:none;
  cursor:pointer;
  color:var(--blue-bright);
  border-radius:8px;
  transition:.15s;
}
.fi-toggle:hover{color:var(--blue-ll);background:rgba(59,130,246,.08)}
.fi-toggle svg{width:22px;height:22px}

/* ====== ROW: lembrar / esqueci ====== */
.row-aux{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:.2rem 0 1.1rem;
  flex-wrap:wrap;
  gap:.5rem;
}
.checkbox-wrap{
  display:flex;
  align-items:center;
  gap:.6rem;
  cursor:pointer;
  user-select:none;
}
.checkbox-wrap input{display:none}
.checkbox-box{
  width:22px;
  height:22px;
  border-radius:6px;
  border:1.5px solid var(--blue-l);
  background:rgba(10,20,40,.5);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.15s;
  flex-shrink:0;
}
.checkbox-box svg{
  width:14px;
  height:14px;
  color:#fff;
  opacity:0;
  transition:.15s;
}
.checkbox-wrap input:checked + .checkbox-box{
  background:var(--blue-l);
  border-color:var(--blue-l);
}
.checkbox-wrap input:checked + .checkbox-box svg{opacity:1}
.checkbox-label{
  font-size:.95rem;
  color:#cdd6e8;
  font-weight:500;
}
.link-esqueci{
  font-size:.92rem;
  color:var(--blue-bright);
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  transition:.15s;
}
.link-esqueci:hover{color:var(--blue-ll);text-decoration:underline}

/* ====== BOTÃO PRINCIPAL ====== */
.btn-submit{
  width:100%;
  padding:1.1rem;
  border-radius:14px;
  font-weight:700;
  font-size:1.05rem;
  letter-spacing:.3px;
  cursor:pointer;
  border:none;
  color:#fff;
  font-family:var(--f-body);
  transition:.2s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:.6rem;
  background:linear-gradient(135deg, #1e5edb 0%, #3b82f6 50%, #4d94ff 100%);
  box-shadow:
    0 8px 24px -6px rgba(59,130,246,.55),
    inset 0 1px 0 rgba(255,255,255,.2);
  margin-bottom:.4rem;
}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
.btn-submit:hover:not(:disabled){
  transform:translateY(-2px);
  filter:brightness(1.1);
  box-shadow:
    0 12px 30px -8px rgba(59,130,246,.7),
    inset 0 1px 0 rgba(255,255,255,.25);
}
.btn-submit:active:not(:disabled){transform:translateY(0)}
.btn-submit .arrow{
  width:18px;
  height:18px;
  transition:.2s;
}
.btn-submit:hover:not(:disabled) .arrow{transform:translateX(3px)}

/* ====== DIVISOR "ou continue com" ====== */
.divider{
  display:flex;
  align-items:center;
  gap:1rem;
  margin:1.3rem 0 1.1rem;
  color:#7a8bb0;
  font-size:.88rem;
}
.divider::before,
.divider::after{
  content:'';
  flex:1;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(138,155,184,.25), transparent);
}

/* ====== BOTÕES SOCIAIS ====== */
.social-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:.75rem;
  margin-bottom:1.2rem;
}
.btn-social{
  padding:.95rem .75rem;
  border-radius:13px;
  background:rgba(10,20,40,.5);
  border:1.5px solid rgba(59,130,246,.22);
  color:var(--text);
  font-size:.95rem;
  font-weight:600;
  font-family:var(--f-body);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:.6rem;
  transition:.18s;
}
.btn-social:hover:not(:disabled){
  background:rgba(20,40,80,.55);
  border-color:rgba(59,130,246,.4);
  transform:translateY(-1px);
}
.btn-social:disabled{opacity:.5;cursor:not-allowed}
.btn-social svg{width:20px;height:20px;flex-shrink:0}
.btn-social .ico-google{
  width:20px;height:20px;flex-shrink:0;
}

/* ====== RODAPÉ DO CARD: criar conta ====== */
.card-foot{
  text-align:center;
  font-size:.95rem;
  color:#a8b6d0;
  padding-top:.4rem;
}
.card-foot .link-criar{
  color:var(--blue-bright);
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:.3rem;
  transition:.15s;
}
.card-foot .link-criar:hover{color:var(--blue-ll)}
.card-foot .link-criar svg{width:14px;height:14px;transition:.2s}
.card-foot .link-criar:hover svg{transform:translateX(3px)}

/* ====== ALERT ====== */
.alert{
  padding:.95rem 1rem;
  border-radius:12px;
  font-size:.9rem;
  margin-bottom:1rem;
  line-height:1.5;
  display:none;
}
.alert.show{display:block}
.alert.error{
  background:rgba(220,38,38,.12);
  border:1px solid rgba(220,38,38,.35);
  color:var(--danger-l);
}
.alert.warn{
  background:rgba(245,158,11,.12);
  border:1px solid rgba(245,158,11,.35);
  color:var(--amber-l);
}
.alert.success{
  background:rgba(34,197,94,.12);
  border:1px solid rgba(34,197,94,.35);
  color:var(--green-l);
}
.alert a{color:inherit;text-decoration:underline;font-weight:600;cursor:pointer}

/* ====== SPINNER ====== */
.spinner{
  width:18px;
  height:18px;
  border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ====== ADMIN LINK (escondido) ====== */
.admin-link{
  position:fixed;
  bottom:1rem;
  right:1rem;
  font-size:.7rem;
  color:var(--dim);
  text-decoration:none;
  opacity:.4;
  transition:.2s;
  z-index:10;
}
.admin-link:hover{opacity:1;color:var(--muted)}

/* ====== FOOTER (voltar ao site) ====== */
.footer{
  text-align:center;
  font-size:.88rem;
  color:var(--muted);
  padding:.4rem;
}
.footer a{
  color:var(--muted);
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:.45rem;
  transition:.15s;
}
.footer a:hover{color:var(--text)}

/* ====== RESPONSIVO ====== */
@media (max-width:420px){
  .card{padding:1.5rem 1.2rem 1.4rem}
  .logo-row img{width:80%}
  .title-main{font-size:1.35rem}
  .title-sub{font-size:.88rem}
  .fi{padding:.95rem 1rem .95rem 2.85rem;font-size:.95rem}
  .btn-submit{padding:1rem;font-size:1rem}
  .btn-social{font-size:.88rem;padding:.85rem .5rem}
  .checkbox-label,.link-esqueci{font-size:.88rem}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <!-- Logo -->
    <div class="logo-row">
      <img src="logo.PNG" alt="Ranketes" onerror="this.style.display='none'"/>
    </div>

    <!-- Título / Slogan -->
    <div class="title-row">
      <h1 class="title-main">
        <span class="w1">Conecte.</span>
        <span class="w2">Jogue.</span>
        <span class="w3">Suba no ranking.</span>
      </h1>
      <p class="title-sub">Acompanhe seus jogos, treinos e evolua a cada partida.</p>
    </div>

    <div class="alert" id="alertBox"></div>

    <!-- Form -->
    <form id="formAuth" onsubmit="enviarForm(event)">
      <div class="fg">
        <label class="fl" for="inpEmail">E-MAIL</label>
        <div class="fi-wrap">
          <span class="fi-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input type="email" class="fi" id="inpEmail" autocomplete="email" placeholder="Seu e-mail" required/>
        </div>
      </div>

      <div class="fg">
        <label class="fl" for="inpSenha">SENHA</label>
        <div class="fi-wrap">
          <span class="fi-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" class="fi" id="inpSenha" autocomplete="current-password" placeholder="Sua senha" required/>
          <button type="button" class="fi-toggle" id="btnTogglePwd" onclick="toggleSenha()" aria-label="Mostrar senha">
            <svg id="iconEye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="row-aux">
        <label class="checkbox-wrap">
          <input type="checkbox" id="inpLembrar" checked/>
          <span class="checkbox-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
          <span class="checkbox-label">Lembrar de mim</span>
        </label>
        <a class="link-esqueci" onclick="esqueciSenha()">Esqueci minha senha</a>
      </div>

      <button type="submit" class="btn-submit" id="btnSubmit">
        <span id="btnTexto">Entrar</span>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" id="btnArrow"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>

    <!-- Divisor -->
    <div class="divider">ou continue com</div>

    <!-- Login social -->
    <div class="social-row">
      <button type="button" class="btn-social" onclick="loginGoogle()">
        <svg class="ico-google" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        <span>Google</span>
      </button>
      <button type="button" class="btn-social" onclick="loginApple()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        <span>Apple</span>
      </button>
    </div>

    <!-- Link criar conta -->
    <div class="card-foot">
      Ainda não tem uma conta?
      <a class="link-criar" onclick="irParaCadastro()">
        Criar conta
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>
  </div>

  <div class="footer">
    <a href="index">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
      Voltar para o site
    </a>
  </div>
</div>

<a class="admin-link" href="ranketes_admin">admin</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
let _processando = false

const URLS = {
  atleta: 'ranketes_atleta_v1',
  professor: 'ranketes_professor_v2',
  arena: 'ranketes_arena_v2',
  admin: 'ranketes_admin'
}

const TIPO_LABELS = {
  atleta: 'ATLETA',
  professor: 'PROFESSOR',
  arena: 'ARENA / CLUBE',
  admin: 'ADMIN'
}

// ============================================================
// LEMBRAR DE MIM
// ============================================================
const LEMBRAR_KEY = 'ranketes_email_lembrado'

function carregarEmailLembrado(){
  try{
    const email = localStorage.getItem(LEMBRAR_KEY)
    if(email){
      document.getElementById('inpEmail').value = email
      document.getElementById('inpLembrar').checked = true
    }
  }catch(e){}
}

function salvarEmailLembrado(email, lembrar){
  try{
    if(lembrar) localStorage.setItem(LEMBRAR_KEY, email)
    else localStorage.removeItem(LEMBRAR_KEY)
  }catch(e){}
}

// ============================================================
// UI HELPERS
// ============================================================
function toggleSenha() {
  const input = document.getElementById('inpSenha')
  const icon = document.getElementById('iconEye')
  const isPwd = input.type === 'password'
  input.type = isPwd ? 'text' : 'password'
  if (isPwd) {
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
  } else {
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
  }
}

function mostrarAlerta(tipo, msg) {
  const el = document.getElementById('alertBox')
  el.className = 'alert show ' + tipo
  el.innerHTML = msg
  // Scroll suave pro alert
  el.scrollIntoView({behavior:'smooth', block:'nearest'})
}

function esconderAlerta() {
  document.getElementById('alertBox').classList.remove('show')
}

function setLoading(loading) {
  _processando = loading
  const btn = document.getElementById('btnSubmit')
  const txt = document.getElementById('btnTexto')
  const arrow = document.getElementById('btnArrow')
  btn.disabled = loading
  if (loading) {
    txt.innerHTML = '<span class="spinner"></span> Aguarde...'
    arrow.style.display = 'none'
  } else {
    txt.textContent = 'Entrar'
    arrow.style.display = 'block'
  }
}

function irParaCadastro(){
  window.location.href = 'ranketes_cadastro'
}

// ============================================================
// FORM SUBMIT
// ============================================================
async function enviarForm(e) {
  e.preventDefault()
  if (_processando) return

  const email = document.getElementById('inpEmail').value.trim().toLowerCase()
  const senha = document.getElementById('inpSenha').value
  const lembrar = document.getElementById('inpLembrar').checked

  if (!email || !senha) {
    mostrarAlerta('error', 'Preencha email e senha')
    return
  }

  if (senha.length < 6) {
    mostrarAlerta('error', 'Senha precisa ter pelo menos 6 caracteres')
    return
  }

  setLoading(true)
  esconderAlerta()

  try {
    await fazerLogin(email, senha, lembrar)
  } catch (err) {
    console.error(err)
    mostrarAlerta('error', 'Erro inesperado: ' + err.message)
    setLoading(false)
  }
}

// ============================================================
// LOGIN PRINCIPAL — detecta tipo automaticamente
// ============================================================
async function fazerLogin(email, senha, lembrar) {
  // 1. Login no Supabase
  const { data, error } = await window._sb.auth.signInWithPassword({ email, password: senha })

  if (error) {
    setLoading(false)
    if (error.message.includes('Invalid login credentials')) {
      mostrarAlerta('error', '❌ Email ou senha incorretos')
    } else if (error.message.includes('Email not confirmed')) {
      mostrarAlerta('warn', '📧 Confirme seu email antes de entrar.<br>Verifique sua caixa de entrada (e spam).')
    } else {
      mostrarAlerta('error', 'Erro: ' + error.message)
    }
    return
  }

  // Salva email se "lembrar de mim" estiver marcado
  salvarEmailLembrado(email, lembrar)

  // 2. Detectar tipo automaticamente
  const userId = data.user.id
  const userEmail = data.user.email
  const tipos = await detectarTiposPerfil(userId, userEmail)
  console.log('[login] tipos detectados:', tipos)

  // 3. Redirecionar pra área correspondente
  await redirecionarPorTipo(userId, userEmail, tipos, data.user)
}

// ============================================================
// REDIRECIONAMENTO POR TIPO (prioridade: admin > atleta > professor > arena)
// ============================================================
async function redirecionarPorTipo(userId, userEmail, tipos, user) {
  // Prioridade do admin
  if (tipos.eh_admin) {
    // Se admin tem perfil de atleta também, vai pro atleta (admin pode usar ambos)
    if (tipos.tem_atleta) { window.location.href = URLS.atleta; return }
    if (tipos.tem_professor) { window.location.href = URLS.professor; return }
    if (tipos.tem_arena) { window.location.href = URLS.arena; return }
    // Admin sem perfil específico — vai pra área admin
    window.location.href = URLS.admin
    return
  }

  // Detecta qual perfil tem (ordem de prioridade)
  if (tipos.tem_atleta) { window.location.href = URLS.atleta; return }
  if (tipos.tem_professor) { window.location.href = URLS.professor; return }
  if (tipos.tem_arena) { window.location.href = URLS.arena; return }

  // Sem perfil cadastrado — tenta criar via metadata
  const tipoMeta = user?.user_metadata?.tipo
  const nomeMeta = user?.user_metadata?.nome || user?.user_metadata?.full_name || ''

  if (tipoMeta && ['atleta','professor','arena'].includes(tipoMeta)) {
    console.log('[login] Criando perfil em fallback:', tipoMeta)
    await criarPerfilTipo(userId, tipoMeta, nomeMeta)
    window.location.href = URLS[tipoMeta]
    return
  }

  // Não tem perfil nem metadata — manda fazer cadastro
  setLoading(false)
  mostrarAlerta('warn',
    `⚠️ Sua conta não tem um perfil completo ainda.<br><br>` +
    `<a onclick="irParaCadastro()">→ Completar cadastro agora</a>`
  )
  await window._sb.auth.signOut()
}

// ============================================================
// CRIAR PERFIL (fallback)
// ============================================================
async function criarPerfilTipo(userId, tipo, nome) {
  try {
    await window._sb.from('usuarios').upsert([{
      id: userId,
      nome: nome || null,
      tipo: tipo
    }], { onConflict: 'id', ignoreDuplicates: false })

    if (tipo === 'atleta') {
      await window._sb.from('atletas').insert([{ usuario_id: userId }])
    } else if (tipo === 'professor') {
      await window._sb.from('professores').insert([{ usuario_id: userId, ativo: true }])
    } else if (tipo === 'arena') {
      await window._sb.from('arenas').insert([{
        responsavel_id: userId,
        nome: nome || 'Arena',
        tipo: 'arena'
      }])
    }
  } catch (e) {
    console.warn('Erro criando perfil:', e)
  }
}

// ============================================================
// DETECTAR TIPO DE PERFIL
// ============================================================
async function detectarTiposPerfil(userId, userEmail) {
  const result = {
    tem_atleta: false,
    tem_professor: false,
    tem_arena: false,
    eh_admin: userEmail === 'wexleyrs@gmail.com'
  }

  // Tenta a RPC primeiro
  try {
    const { data, error } = await window._sb.rpc('meu_tipo_perfil')
    if (!error && data) {
      return {
        tem_atleta: !!data.tem_atleta,
        tem_professor: !!data.tem_professor,
        tem_arena: !!data.tem_arena,
        eh_admin: !!data.eh_admin
      }
    }
  } catch (e) { console.warn('RPC meu_tipo_perfil falhou:', e) }

  // Fallback: queries diretas
  try {
    const { data } = await window._sb.from('atletas')
      .select('id').eq('usuario_id', userId).is('excluido_em', null).maybeSingle()
    if (data) result.tem_atleta = true
  } catch (e) {}

  try {
    const { data } = await window._sb.from('professores')
      .select('id').eq('usuario_id', userId).is('excluido_em', null).maybeSingle()
    if (data) result.tem_professor = true
  } catch (e) {}

  try {
    const { data } = await window._sb.from('arenas')
      .select('id').eq('responsavel_id', userId).is('excluido_em', null).maybeSingle()
    if (data) result.tem_arena = true
  } catch (e) {}

  return result
}

// ============================================================
// ESQUECI MINHA SENHA
// ============================================================
async function esqueciSenha() {
  const email = document.getElementById('inpEmail').value.trim().toLowerCase()
  if (!email) {
    mostrarAlerta('warn', 'Digite seu email primeiro')
    document.getElementById('inpEmail').focus()
    return
  }

  if (!confirm(`Enviar link de redefinição de senha para ${email}?`)) return

  try {
    const { error } = await window._sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/ranketes_login'
    })
    if (error) {
      mostrarAlerta('error', 'Erro: ' + error.message)
      return
    }
    mostrarAlerta('success', `✓ Link enviado para ${email}.<br>Verifique sua caixa de entrada (e spam).`)
  } catch (e) {
    mostrarAlerta('error', 'Erro: ' + e.message)
  }
}

// ============================================================
// DETECTAR CONFIRMAÇÃO DE EMAIL VIA URL
// ============================================================
function detectarConfirmacaoEmail() {
  const hash = window.location.hash.substring(1)
  const search = window.location.search.substring(1)
  const params = new URLSearchParams(hash || search)

  const type = params.get('type')
  const errorCode = params.get('error_code') || params.get('error')
  const errorDesc = params.get('error_description')

  if (errorCode) {
    let msg = '⚠️ Não foi possível confirmar o email.'
    if (errorDesc) msg += '<br><br>' + decodeURIComponent(errorDesc.replace(/\+/g, ' '))
    if (errorCode === 'otp_expired' || (errorDesc || '').includes('expired')) {
      msg = '⏰ Esse link de confirmação expirou.<br><br>Faça login pra receber um novo email de confirmação.'
    }
    mostrarAlerta('warn', msg)
    history.replaceState(null, '', window.location.pathname)
    return true
  }

  if (type === 'signup' || type === 'email') {
    mostrarAlerta('success', '✓ <b>Email confirmado com sucesso!</b><br>Agora é só entrar com seu email e senha.')
    history.replaceState(null, '', window.location.pathname)
    return true
  }

  if (type === 'recovery') {
    mostrarAlerta('success', '✓ Link verificado! Defina uma nova senha entrando com qualquer senha — você será redirecionado.')
    history.replaceState(null, '', window.location.pathname)
    return true
  }

  return false
}

// ============================================================
// AUTO-LOGIN: se já estiver logado, redireciona automaticamente
// ============================================================
document.addEventListener('supabase:ready', async () => {
  carregarEmailLembrado()

  const veioDeConfirmacao = detectarConfirmacaoEmail()

  try {
    const { data: { user } } = await window._sb.auth.getUser()
    if (!user) return

    // Se acabou de confirmar email, força signOut pra ele logar manualmente
    if (veioDeConfirmacao) {
      await window._sb.auth.signOut()
      if (user.email) {
        document.getElementById('inpEmail').value = user.email
      }
      return
    }

    // Já está logado — detecta tipo e redireciona
    const tipos = await detectarTiposPerfil(user.id, user.email)
    await redirecionarPorTipo(user.id, user.email, tipos, user)
  } catch (e) {
    console.warn('check sessão:', e)
  }
})
